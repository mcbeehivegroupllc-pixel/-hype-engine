<script type="text/babel" data-presets="react">
// ============================================================
// >>>>>>>>>>>  FILL IN THESE 3 VALUES  <<<<<<<<<<<
// ============================================================
const SUPABASE_URL  = "https://ayvxbxuedfiifttwhixc.supabase.co"; // your project URL (already filled from your project)
const SUPABASE_ANON = "PUT_KEY_BETWEEN_THESE_QUOTES";
const STRIPE_PRO_LINK = "https://buy.stripe.com/00waEX3Brebt5KKaKp7EQ05";
// ============================================================

const { useState, useEffect, useCallback } = React;
const ACCENT = "#ff3b3b";
const FREE_DAILY_SCOUTS = 6;

const TIERS = [
  { name: "STREET SCOUT", min: 0, color: "#8a8a8a" },
  { name: "PLUG", min: 30, color: "#37c871" },
  { name: "TASTEMAKER", min: 80, color: "#3b9dff" },
  { name: "KINGMAKER", min: 160, color: "#b06bff", proOnly: true },
  { name: "ORACLE", min: 300, color: "#ffb627", proOnly: true },
];
const SEED_VIBES = ["West Coast", "Dark trap", "Soulful boom bap", "Melodic drill", "Plugg", "G-funk revival"];

function tierFor(score, isPro) {
  let t = TIERS[0];
  for (const tier of TIERS) {
    if (tier.proOnly && !isPro) continue;
    if (score >= tier.min) t = tier;
  }
  return t;
}

let SESSION = { token: null, uid: null, email: null };
const sb = {
  headers: (extra = {}) => ({
    apikey: SUPABASE_ANON,
    Authorization: `Bearer ${SESSION.token || SUPABASE_ANON}`,
    "Content-Type": "application/json",
    ...extra,
  }),
  async get(path) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: sb.headers() });
    return r.json();
  },
  async post(path, body, prefer = "return=representation") {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      method: "POST", headers: sb.headers({ Prefer: prefer }), body: JSON.stringify(body),
    });
    return r.json();
  },
  async rpc(fn, args) {
    return fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
      method: "POST", headers: sb.headers(), body: JSON.stringify(args),
    });
  },
  async signUp(email, password) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: "POST", headers: { apikey: SUPABASE_ANON, "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    });
    return r.json();
  },
  async signIn(email, password) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST", headers: { apikey: SUPABASE_ANON, "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    });
    return r.json();
  },
};

function App() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState({ hype_points: 0, is_pro: false });

  const loadProfile = useCallback(async (uid) => {
    const rows = await sb.get(`scouts?user_id=eq.${uid}&select=hype_points,is_pro`);
    if (rows && rows[0]) setProfile(rows[0]);
    else { await sb.post("scouts", { user_id: uid }, "resolution=ignore-duplicates"); setProfile({ hype_points: 0, is_pro: false }); }
  }, []);

  useEffect(() => { if (user) loadProfile(user.id); }, [user, loadProfile]);

  function onAuthed(session) {
    SESSION = { token: session.access_token, uid: session.user.id, email: session.user.email };
    setUser({ id: session.user.id, email: session.user.email });
  }
  function signOut() {
    SESSION = { token: null, uid: null, email: null };
    setUser(null); setProfile({ hype_points: 0, is_pro: false });
  }

  return (
    <div style={S.root}>
      <div style={S.grain} />
      {!user
        ? <Auth onAuthed={onAuthed} />
        : <Scout user={user} profile={profile} reloadProfile={() => loadProfile(user.id)} signOut={signOut} />}
    </div>
  );
}

function Auth({ onAuthed }) {
  const [mode, setMode] = useState("in");
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  async function go() {
    setErr(""); setBusy(true);
    try {
      const fn = mode === "in" ? sb.signIn : sb.signUp;
      const res = await fn(email, pw);
      if (res.access_token) onAuthed(res);
      else if (res.user && !res.access_token) setErr("Check your email to confirm, then sign in.");
      else setErr(res.msg || res.error_description || res.error || "Couldn't authenticate.");
    } catch { setErr("Network hiccup. Try again."); }
    setBusy(false);
  }

  return (
    <div style={S.authWrap}>
      <div style={S.logo}>HYPE<span style={{ color: ACCENT }}>·</span>ENGINE</div>
      <div style={S.authSub}>AI SCOUT — by TRIX$TER106</div>
      <div style={S.authCard}>
        <h2 style={S.authH}>{mode === "in" ? "Welcome back, scout." : "Start scouting."}</h2>
        <input style={S.input} placeholder="email" value={email} onChange={e => setEmail(e.target.value)} />
        <input style={S.input} type="password" placeholder="password" value={pw} onChange={e => setPw(e.target.value)} />
        {err ? <div style={S.err}>{err}</div> : null}
        <button style={S.cta} disabled={busy || !email || !pw} onClick={go}>
          {busy ? "…" : mode === "in" ? "SIGN IN →" : "CREATE ACCOUNT →"}
        </button>
        <div style={S.switch} onClick={() => { setMode(mode === "in" ? "up" : "in"); setErr(""); }}>
          {mode === "in" ? "New here? Create an account" : "Got an account? Sign in"}
        </div>
      </div>
    </div>
  );
}

function Scout({ user, profile, reloadProfile, signOut }) {
  const [vibes, setVibes] = useState([]);
  const [stage, setStage] = useState("pick");
  const [scouted, setScouted] = useState([]);
  const [calls, setCalls] = useState({});
  const [cardArtist, setCardArtist] = useState(null);
  const [breakouts, setBreakouts] = useState([]);
  const [scoutsToday, setScoutsToday] = useState(0);
  const [paywall, setPaywall] = useState(false);
  const [err, setErr] = useState("");

  const isPro = profile.is_pro;
  const score = profile.hype_points;
  const tier = tierFor(score, isPro);
  const nextTier = TIERS.find(t => t.min > score);

  useEffect(() => {
    (async () => {
      const rows = await sb.get(`calls?user_id=eq.${user.id}&verified=eq.true&select=artist_id,pop_at_call,pop_at_verify,artists(name,city,image_url)&order=verified_at.desc&limit=5`);
      if (Array.isArray(rows) && rows.length) setBreakouts(rows);
    })();
  }, [user.id]);

  function toggleVibe(v) { setVibes(p => p.includes(v) ? p.filter(x => x !== v) : [...p, v]); }

  async function runEngine() {
    if (!isPro && scoutsToday >= FREE_DAILY_SCOUTS) { setPaywall(true); return; }
    setStage("loading"); setErr("");
    try {
      const inList = vibes.map(v => `"${v}"`).join(",");
      const data = await sb.get(`artists?genre_tag=in.(${encodeURIComponent(inList)})&order=scouted_at.desc,buzz.desc&limit=${isPro ? 12 : 6}`);
      if (!Array.isArray(data) || !data.length) { setErr("No fresh scouts yet — the engine refreshes daily. Try other vibes."); setStage("pick"); return; }
      setScouted(data);
      setStage("feed");
    } catch { setErr("Engine choked. Hit retry."); setStage("pick"); }
  }

  async function callEarly(a) {
    if (calls[a.id]) return;
    if (!isPro && scoutsToday >= FREE_DAILY_SCOUTS) { setPaywall(true); return; }
    const base = Math.max(5, Math.round((100 - a.buzz) / 4) + 8);
    const pts = isPro ? base * 2 : base;
    setCalls(p => ({ ...p, [a.id]: "early" }));
    setScoutsToday(n => n + 1);
    await sb.post("calls", {
      user_id: user.id, artist_id: a.id,
      pop_at_call: a.popularity, followers_at_call: a.followers,
    }, "resolution=ignore-duplicates");
    await sb.rpc("add_hype", { uid: user.id, pts });
    await reloadProfile();
    setCardArtist({ ...a, pts });
  }

  function pass(a) { setCalls(p => ({ ...p, [a.id]: "pass" })); }

  return (
    <React.Fragment>
      <header style={S.header}>
        <div>
          <div style={S.logoSm}>HYPE<span style={{ color: ACCENT }}>·</span>ENGINE</div>
          <div style={S.byline}>{user.email}{isPro ? <span style={S.proPill}>PRO</span> : null}</div>
        </div>
        <div style={S.rankBox}>
          <div style={{ ...S.rankTier, color: tier.color }}>{tier.name}</div>
          <div style={S.rankScore}>{score} <span style={{ opacity: .5, fontSize: 12 }}>HYPE</span></div>
          {nextTier ? <div style={S.progWrap}><div style={{ ...S.progBar, width: `${Math.min(100, ((score - tier.min) / (nextTier.min - tier.min)) * 100)}%`, background: tier.color }} /></div> : null}
          <div style={S.signout} onClick={signOut}>sign out</div>
        </div>
      </header>

      {breakouts.length > 0 ? (
        <div style={S.breakoutBar}>
          🔥 VERIFIED BREAKOUT — you called <b>{breakouts[0].artists ? breakouts[0].artists.name : "an artist"}</b> at {breakouts[0].pop_at_call}, now {breakouts[0].pop_at_verify}.
          <button style={S.breakoutBtn} onClick={() => setCardArtist({
            name: breakouts[0].artists ? breakouts[0].artists.name : "Your pick", city: breakouts[0].artists ? breakouts[0].artists.city : "",
            pts: 25, verified: true,
          })}>FLEX IT</button>
        </div>
      ) : null}

      {stage === "pick" ? (
        <section style={S.section}>
          <h1 style={S.h1}>What you bumpin'?</h1>
          <p style={S.lede}>Pick your vibes. The engine pulls real unsigned artists about to break — call 'em early, bank Hype Points, climb to Oracle.</p>
          {!isPro ? <div style={S.quota}>{FREE_DAILY_SCOUTS - scoutsToday} free calls left today · <span style={S.upLink} onClick={() => setPaywall(true)}>go unlimited →</span></div> : null}
          <div style={S.vibeGrid}>
            {SEED_VIBES.map(v => <button key={v} onClick={() => toggleVibe(v)} style={{ ...S.vibe, ...(vibes.includes(v) ? S.vibeOn : {}) }}>{v}</button>)}
          </div>
          {err ? <div style={S.err}>{err}</div> : null}
          <button disabled={!vibes.length} onClick={runEngine} style={{ ...S.cta, width: "auto", padding: "16px 40px", opacity: vibes.length ? 1 : .4, marginTop: 8 }}>RUN THE ENGINE →</button>
        </section>
      ) : null}

      {stage === "loading" ? (
        <section style={S.section}><div className="pulse" style={S.loadBig}>SCOUTING THE UNDERGROUND…</div><div style={S.loadSub}>{vibes.join(" · ")}</div></section>
      ) : null}

      {stage === "feed" ? (
        <section style={S.section}>
          <div style={S.feedHead}><h2 style={S.h2}>Fresh from the underground</h2><button onClick={() => { setStage("pick"); setScouted([]); setVibes([]); }} style={S.reset}>↺ new scout</button></div>
          <div style={S.cards}>
            {scouted.map(a => {
              const c = calls[a.id];
              return (
                <div key={a.id} style={{ ...S.card, ...(c === "early" ? S.cardEarly : c === "pass" ? S.cardPass : {}) }}>
                  {a.image_url ? <div style={{ ...S.art, backgroundImage: `url(${a.image_url})` }} /> : null}
                  <div style={S.cardBody}>
                    <div style={S.cardTop}>
                      <div style={S.artName}>{a.name}</div>
                      <div style={S.buzz}><span style={{ color: a.buzz > 70 ? ACCENT : a.buzz > 40 ? "#ffb627" : "#37c871" }}>●</span> {a.buzz}</div>
                    </div>
                    {a.city ? <div style={S.city}>{a.city}</div> : null}
                    <div style={S.momentum}><b>Momentum:</b> {a.momentum}</div>
                    <div style={S.verdict}>"{a.verdict}"</div>
                    <div style={S.stats}>{(a.followers || 0).toLocaleString()} followers · {(a.yt_velocity || 0).toLocaleString()} YT views/day</div>
                    {!c ? (
                      <div style={S.actions}>
                        <button onClick={() => callEarly(a)} style={S.callBtn}>🔥 CALL IT EARLY</button>
                        <button onClick={() => pass(a)} style={S.passBtn}>PASS</button>
                      </div>
                    ) : c === "early" ? <div style={S.calledTag}>✓ CALLED — snapshot saved</div> : <div style={S.passedTag}>passed</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      ) : null}

      {cardArtist ? <FlexCard artist={cardArtist} tier={tier} onClose={() => setCardArtist(null)} /> : null}
      {paywall ? <Paywall onClose={() => setPaywall(false)} /> : null}

      <footer style={S.footer}>HYPE ENGINE © McBeeHive Group LLC · a TRIX$TER106 product · Los Angeles</footer>
    </React.Fragment>
  );
}

function FlexCard({ artist, tier, onClose }) {
  return (
    <div style={S.modalBg} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={S.modalWrap}>
        <div style={S.flex}>
          <div style={S.flexGrain} />
          <div style={S.flexTop}>{artist.verified ? "✓ VERIFIED BREAKOUT" : "I CALLED IT FIRST"}</div>
          <div style={S.flexName}>{artist.name}</div>
          {artist.city ? <div style={S.flexCity}>{artist.city}</div> : null}
          <div style={{ ...S.flexTier, color: tier.color }}>{tier.name} · +{artist.pts} HYPE</div>
          <div style={S.flexBrand}>scouted on HYPE·ENGINE — TRIX$TER106</div>
        </div>
        <div style={S.flexActions}>
          <button style={S.shareBtn} onClick={() => {
            const txt = `I called ${artist.name} early on HYPE·ENGINE 🔥 ${artist.verified ? "VERIFIED breakout." : "watch this one blow."} #HypeEngine #TRIXSTER106`;
            if (navigator.share) navigator.share({ text: txt }).catch(() => {});
            else if (navigator.clipboard) navigator.clipboard.writeText(txt);
          }}>SHARE THE FLEX</button>
          <button style={S.closeBtn} onClick={onClose}>keep scouting</button>
        </div>
      </div>
    </div>
  );
}

function Paywall({ onClose }) {
  return (
    <div style={S.modalBg} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ ...S.modalWrap, maxWidth: 420 }}>
        <div style={S.payCard}>
          <div style={S.payTop}>GO PRO SCOUT</div>
          <div style={S.payPrice}>$9.99<span style={{ fontSize: 16, opacity: .5 }}>/mo</span></div>
          <div style={S.payList}>
            {["Unlimited scouting", "Verified breakout alerts", "2× Hype Point multiplier", "Kingmaker & Oracle tiers", "Early access to TRIXSTERBEATS drops"].map(f => (
              <div key={f} style={S.payItem}><span style={{ color: ACCENT, fontWeight: 800, marginRight: 8 }}>→</span>{f}</div>
            ))}
          </div>
          <a href={STRIPE_PRO_LINK} target="_blank" rel="noreferrer" style={S.payBtn}>UPGRADE NOW →</a>
          <div style={S.switch} onClick={onClose}>maybe later</div>
        </div>
      </div>
    </div>
  );
}
